name = "dmlog-ai"
main = "worker/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./web"

[[d1_databases]]
binding = "DB"
database_name = "dmlog-db"
database_id = ""  # TODO: create with `wrangler d1 create dmlog-db`

[[kv_namespaces]]
binding = "KV"
id = ""  # TODO: create with `wrangler kv namespace create dmlog-kv`

[vars]
ENVIRONMENT = "production"
THEME = "dmlog"
PERSONALITY = "dnd-dm"

# Secrets (set via wrangler secret put):
# JWT_SECRET, DEEPSEEK_API_KEY
